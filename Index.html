<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MRP Calculator</title>
  
  <!-- Pinned specific, stable versions of the libraries -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: '#0B0B45',
            pale: '#FFF9E6',
            danger: '#FF3B30'
          },
          fontWeight: {
            semibold: '600',
            bold: '800',
            black: '900'
          }
        }
      }
    }
  </script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    body { 
      margin: 0; 
      padding: 0; 
      background: #FFF9E6; 
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(11, 11, 69, 0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(11, 11, 69, 0.4); }

    /* Hide number input arrows */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body class="bg-pale text-brand overflow-x-hidden selection:bg-brand selection:text-pale">
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;

    // --- LUCIDE ICON WRAPPER ---
    const Icon = ({ name, size = 20, className = "", strokeWidth = 2 }) => {
      const spanRef = useRef(null);
      useEffect(() => {
        if (spanRef.current && window.lucide) {
          spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
          window.lucide.createIcons({ root: spanRef.current });
          const svg = spanRef.current.querySelector('svg');
          if (svg) {
            svg.setAttribute('width', size);
            svg.setAttribute('height', size);
            svg.setAttribute('stroke-width', strokeWidth);
            if (className) {
              className.split(' ').forEach(c => {
                if(c.trim()) svg.classList.add(c.trim());
              });
            }
          }
        }
      }, [name, size, className, strokeWidth]);
      return <span ref={spanRef} className="contents flex items-center justify-center"></span>;
    };

    // --- REUSABLE INPUT COMPONENT ---
    const Input = ({ label, value, onChange, type = "number", placeholder = "0.00", icon, highlight = false, className = "" }) => (
      <div className={`flex flex-col ${className}`}>
        <label className="text-[11px] font-bold text-brand mb-1 opacity-70 uppercase tracking-wide">{label}</label>
        <div className="relative group">
          {icon && <div className="absolute left-3 top-1/2 -translate-y-1/2 opacity-40 group-focus-within:opacity-100 transition-opacity"><Icon name={icon} size={16}/></div>}
          <input
            type={type}
            className={`w-full bg-white border-2 rounded-xl py-2.5 text-[15px] font-bold text-brand transition-all shadow-sm outline-none
              ${highlight ? 'border-brand/30 bg-brand/5' : 'border-black/5 focus:border-brand'} 
              ${icon ? 'pl-9 pr-3' : 'px-3'}`}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            step="any"
          />
        </div>
      </div>
    );

    function App() {
      const [mode, setMode] = useState('vendor'); // 'vendor' | 'inhouse'
      const [down, setDown] = useState(37.5); // 37.5 | 40

      // --- VENDOR STATE ---
      const [vendor, setVendor] = useState({ pp: '', markup: '40', wsp: '' });

      // --- IN-HOUSE STATE ---
      const [inHouse, setInHouse] = useState({
        fabricRate: '', fabricAvg: '', fabricAmt: '',
        collarRate: '', collarAvg: '', collarAmt: '',
        fabrication: '', label: '10', services: '', ohd: '',
        landingCost: '', markup: '40', wsp: ''
      });

      // --- VENDOR LOGIC ---
      const updateVendor = (field, value) => {
        let newSt = { ...vendor, [field]: value };
        if (field === 'pp' || field === 'markup') {
          const pp = parseFloat(newSt.pp) || 0;
          const mu = parseFloat(newSt.markup) || 0;
          if (newSt.pp) {
            newSt.wsp = (pp * (1 + mu / 100)).toFixed(2);
          }
        }
        setVendor(newSt);
      };

      // --- IN-HOUSE LOGIC ---
      const updateInHouse = (field, value) => {
        let newSt = { ...inHouse, [field]: value };
        
        // Auto-calc Fabric Amount
        if (field === 'fabricRate' || field === 'fabricAvg') {
          const r = parseFloat(newSt.fabricRate) || 0;
          const a = parseFloat(newSt.fabricAvg) || 0;
          if (newSt.fabricRate && newSt.fabricAvg) newSt.fabricAmt = (r * a).toFixed(2);
        }
        // Auto-calc Collar Amount
        if (field === 'collarRate' || field === 'collarAvg') {
          const r = parseFloat(newSt.collarRate) || 0;
          const a = parseFloat(newSt.collarAvg) || 0;
          if (newSt.collarRate && newSt.collarAvg) newSt.collarAmt = (r * a).toFixed(2);
        }
        
        // Auto-calc Landing Cost
        const impactLanding = ['fabricRate', 'fabricAvg', 'fabricAmt', 'collarRate', 'collarAvg', 'collarAmt', 'fabrication', 'label', 'services', 'ohd'];
        if (impactLanding.includes(field)) {
          const sum = (parseFloat(newSt.fabricAmt) || 0) + 
                      (parseFloat(newSt.collarAmt) || 0) + 
                      (parseFloat(newSt.fabrication) || 0) + 
                      (parseFloat(newSt.label) || 0) + 
                      (parseFloat(newSt.services) || 0) + 
                      (parseFloat(newSt.ohd) || 0);
          newSt.landingCost = sum > 0 ? sum.toFixed(2) : '';
        }

        // Auto-calc WSP
        const impactWSP = [...impactLanding, 'landingCost', 'markup'];
        if (impactWSP.includes(field)) {
          const lc = parseFloat(newSt.landingCost) || 0;
          const mu = parseFloat(newSt.markup) || 0;
          if (newSt.landingCost) {
            newSt.wsp = (lc * (1 + mu / 100)).toFixed(2);
          }
        }
        setInHouse(newSt);
      };

      // --- CORE CALCULATIONS (Shared) ---
      const activeWsp = parseFloat(mode === 'vendor' ? vendor.wsp : inHouse.wsp) || 0;
      const tentativeMRP = activeWsp > 0 ? (activeWsp / (1 - down / 100)) : 0;
      
      // Auto Rounding to next 49 or 99
      let finalMRP = 0;
      if (tentativeMRP > 0) {
        const exactCeil = Math.ceil(tentativeMRP);
        const base = Math.floor(exactCeil / 100) * 100;
        const remainder = exactCeil % 100;
        
        if (remainder <= 49 && exactCeil !== base) { 
          finalMRP = base + 49;
        } else if (exactCeil === base) {
          finalMRP = base + 49; 
        } else {
          finalMRP = base + 99;
        }
      }

      // Tentative WSP Logic
      const exactTentativeWSP = finalMRP > 0 ? (finalMRP * (1 - down / 100)) : 0;
      const roundedTentativeWSP = Math.ceil(exactTentativeWSP);

      // UI Helpers
      const is40Mode = down === 40;

      return (
        <div className="min-h-screen flex flex-col pb-[160px]">
          
          {/* HEADER SECTION */}
          <header className={`pt-6 pb-6 px-4 md:px-8 rounded-b-[2rem] shadow-sm transition-colors duration-500 relative overflow-hidden ${is40Mode ? 'bg-danger text-white' : 'bg-brand text-pale'}`}>
            
            {/* Background Pattern for 40% mode */}
            {is40Mode && (
              <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 10px, #000 10px, #000 20px)' }}></div>
            )}

            <div className="relative z-10 max-w-2xl mx-auto flex flex-col gap-5">
              <div className="flex justify-between items-center">
                <div className="flex items-center gap-2">
                  <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${is40Mode ? 'bg-white text-danger' : 'bg-pale text-brand'}`}>
                    <Icon name="calculator" size={24} />
                  </div>
                  <div>
                    <h1 className="text-xl font-black leading-tight">MRP Calculator</h1>
                    {is40Mode && <span className="text-[10px] font-bold uppercase tracking-widest bg-white/20 px-2 py-0.5 rounded-full inline-block mt-1">40% Mode Active</span>}
                  </div>
                </div>

                {/* Down % Toggle */}
                <div className="flex items-center bg-black/20 p-1 rounded-full backdrop-blur-sm shadow-inner">
                  <button 
                    onClick={() => setDown(37.5)}
                    className={`px-4 py-1.5 rounded-full text-sm font-bold transition-all ${down === 37.5 ? 'bg-pale text-brand shadow-sm' : 'text-white/70 hover:text-white'}`}
                  >
                    37.5%
                  </button>
                  <button 
                    onClick={() => setDown(40)}
                    className={`px-4 py-1.5 rounded-full text-sm font-bold transition-all ${down === 40 ? 'bg-white text-danger shadow-md scale-105' : 'text-white/70 hover:text-white'}`}
                  >
                    40%
                  </button>
                </div>
              </div>

              {/* TABS */}
              <div className="flex bg-black/10 p-1 rounded-2xl">
                <button 
                  onClick={() => setMode('vendor')}
                  className={`flex-1 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all ${mode === 'vendor' ? 'bg-white text-brand shadow-sm' : 'text-white/70'}`}
                >
                  <Icon name="shopping-bag" size={16} /> Vendor
                </button>
                <button 
                  onClick={() => setMode('inhouse')}
                  className={`flex-1 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-all ${mode === 'inhouse' ? 'bg-white text-brand shadow-sm' : 'text-white/70'}`}
                >
                  <Icon name="factory" size={16} /> In-House
                </button>
              </div>
            </div>
          </header>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 max-w-2xl mx-auto w-full p-4 md:p-8 flex flex-col gap-4 animate-[fadeIn_0.3s_ease-out]">
            
            {mode === 'vendor' ? (
              // --- VENDOR FORM ---
              <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-brand/5 flex flex-col gap-4">
                <div className="flex items-center gap-2 mb-2 opacity-80">
                  <Icon name="tag" size={18} />
                  <h2 className="font-bold">Vendor Details</h2>
                </div>
                
                <div className="grid grid-cols-2 gap-4">
                  <Input label="Purchase Price" icon="indian-rupee" value={vendor.pp} onChange={e => updateVendor('pp', e.target.value)} />
                  <Input label="Markup (%)" icon="percent" value={vendor.markup} onChange={e => updateVendor('markup', e.target.value)} />
                </div>
                
                <div className="mt-2 pt-4 border-t border-brand/5">
                  <Input label="Wholesale Price (WSP)" icon="indian-rupee" value={vendor.wsp} onChange={e => updateVendor('wsp', e.target.value)} highlight={true} />
                </div>
              </div>
            ) : (
              // --- IN-HOUSE FORM ---
              <div className="flex flex-col gap-4">
                
                {/* Fabric Block */}
                <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-brand/5">
                  <div className="flex items-center gap-2 mb-4 opacity-80">
                    <Icon name="scissors" size={18} />
                    <h2 className="font-bold">Fabric Cost</h2>
                  </div>
                  <div className="grid grid-cols-3 gap-3">
                    <Input label="Rate" value={inHouse.fabricRate} onChange={e => updateInHouse('fabricRate', e.target.value)} />
                    <Input label="Avg" value={inHouse.fabricAvg} onChange={e => updateInHouse('fabricAvg', e.target.value)} />
                    <Input label="Amount" value={inHouse.fabricAmt} onChange={e => updateInHouse('fabricAmt', e.target.value)} highlight={true} />
                  </div>
                </div>

                {/* Collar Block */}
                <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-brand/5">
                  <div className="flex items-center gap-2 mb-4 opacity-80">
                    <Icon name="layers" size={18} />
                    <h2 className="font-bold">Collar Tape & Rib</h2>
                  </div>
                  <div className="grid grid-cols-3 gap-3">
                    <Input label="Rate" value={inHouse.collarRate} onChange={e => updateInHouse('collarRate', e.target.value)} />
                    <Input label="Avg" value={inHouse.collarAvg} onChange={e => updateInHouse('collarAvg', e.target.value)} />
                    <Input label="Amount" value={inHouse.collarAmt} onChange={e => updateInHouse('collarAmt', e.target.value)} highlight={true} />
                  </div>
                </div>

                {/* Overhead Block */}
                <div className="bg-white p-5 rounded-[2rem] shadow-sm border border-brand/5">
                  <div className="flex items-center gap-2 mb-4 opacity-80">
                    <Icon name="settings" size={18} />
                    <h2 className="font-bold">Additional Costs</h2>
                  </div>
                  <div className="grid grid-cols-2 gap-4 mb-4">
                    <Input label="Fabrication" value={inHouse.fabrication} onChange={e => updateInHouse('fabrication', e.target.value)} />
                    <Input label="Label / Tag" value={inHouse.label} onChange={e => updateInHouse('label', e.target.value)} />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <Input label="Services" value={inHouse.services} onChange={e => updateInHouse('services', e.target.value)} />
                    <Input label="OHD Charges" value={inHouse.ohd} onChange={e => updateInHouse('ohd', e.target.value)} />
                  </div>
                </div>

                {/* Summary Block */}
                <div className="bg-brand/5 p-5 rounded-[2rem] border border-brand/10">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <Input label="Landing Cost (Sum)" icon="indian-rupee" value={inHouse.landingCost} onChange={e => updateInHouse('landingCost', e.target.value)} highlight={true} className="md:col-span-2" />
                  </div>
                  <div className="grid grid-cols-2 gap-4 pt-4 border-t border-brand/10">
                    <Input label="Markup (%)" icon="percent" value={inHouse.markup} onChange={e => updateInHouse('markup', e.target.value)} />
                    <Input label="Final WSP" icon="indian-rupee" value={inHouse.wsp} onChange={e => updateInHouse('wsp', e.target.value)} highlight={true} />
                  </div>
                </div>

              </div>
            )}
            
          </main>

          {/* RESULTS BOTTOM SHEET */}
          <div className="fixed bottom-0 left-0 right-0 glass-panel bg-white/95 border-t border-black/5 shadow-[0_-10px_40px_rgba(11,11,69,0.08)] z-50 rounded-t-[2rem]">
            <div className="max-w-2xl mx-auto p-5 md:p-6 pb-8">
              
              <div className="flex items-end justify-between">
                
                {/* Left Side: WSP Details */}
                <div className="flex flex-col">
                  <div className="flex items-center gap-1.5 mb-1 opacity-60">
                    <Icon name="check-circle" size={14} />
                    <span className="text-[11px] font-bold uppercase tracking-wider text-brand">Actual WSP</span>
                  </div>
                  <div className="flex items-baseline gap-2">
                    <span className="text-2xl font-black text-brand tracking-tight">
                      ₹{roundedTentativeWSP}
                    </span>
                  </div>
                  <span className="text-[11px] font-semibold text-brand/50 mt-0.5">
                    Exact: {exactTentativeWSP.toFixed(3)}
                  </span>
                </div>

                {/* Divider */}
                <div className="w-[1px] h-12 bg-brand/10 mx-4"></div>

                {/* Right Side: MRP Details */}
                <div className="flex flex-col text-right items-end">
                  <div className="flex flex-col items-end mb-1">
                    <span className="text-[11px] font-bold uppercase tracking-wider text-brand opacity-60">Tentative MRP</span>
                    <span className="text-xs font-bold text-brand/70 line-through decoration-danger/50 decoration-2">₹{tentativeMRP.toFixed(2)}</span>
                  </div>
                  
                  <div className="relative">
                    <span className={`text-[42px] leading-none font-black tracking-tighter ${is40Mode ? 'text-danger' : 'text-brand'}`}>
                      ₹{finalMRP}
                    </span>
                    {finalMRP > 0 && (
                      <div className="absolute -top-3 -right-3">
                        <span className="flex h-4 w-4">
                          <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                          <span className="relative inline-flex rounded-full h-4 w-4 bg-green-500 border-2 border-white"></span>
                        </span>
                      </div>
                    )}
                  </div>
                </div>

              </div>

            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
